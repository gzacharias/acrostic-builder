<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="builder.css">
<title>Acrostic Builder</title>
</head>
<body>

<h1>Acrostic Builder</h1>

<div class="panel">

  <div class="subview">
    <label>Quotation</label>
    <div id="quotation" contenteditable="true" class="editable" placeholder="Enter quotation…"></div>
  </div>

  <div class="subview">
    <label>Title/Author</label>
    <div id="source" contenteditable="true" class="editable" placeholder="Enter source of quotation…"></div>
  </div>

  <div class="subview" id="letters-subview">
    <label>Available Letters</label>
    <div id="letters"></div>
  </div>

  <div class="subview" style="position: relative">
    <label id="words-label">Words</label>
    <div id="words-container">
      <span id="words-placeholder">Words entries will appear here once Title/Author is entered.</span>
    </div>
    <div id="thinking-overlay" style="display:none">Pondering clue suggestions…</div>
  </div>

</div>

<div class="buttons">
  <button id="clue-btn" title="Switch to writing clues for the answers (enabled when puzzle is complete)" disabled>Add Clues</button>
  <button id="restart-btn" title="Start a new puzzle">Restart</button>
  <button id="save-btn" title="Save this puzzle to a file">Save</button>
  <button id="load-btn" title="Load a previously saved puzzle from a file">Load</button>
  <button id="quit-btn" Quit</button>
  <input type="file" id="file-input" style="display:none">
</div>

<script src="utils.js"></script>
<script src="builder.js"></script>

</body>
</html>
