<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="acrostics.css">
<meta charset="UTF-8">
<title>Acrostic Builder</title>
</head>
<body>

<h1>Acrostics Builder</h1>

<div class="panel">

  <div class="subview">
    <label>Quotation</label>
    <textarea id="quotation" rows="4" placeholder="Enter quotation…"></textarea>
  </div>

  <div class="subview">
    <label>Title/Author</label>
    <div id="source" contenteditable="true" class="editable" placeholder="Enter source of quotation…"></div>
  </div>

  <div class="subview">
    <label>Available Letters</label>
    <div id="letters"></div>
  </div>

  <div class="subview">
    <label>Words</label>
    <div id="words-container">
      <span id="words-placeholder">Words entries will appear here once Title/Author is entered.</span>
    </div>
  </div>

</div>

<div class="buttons">
  <button id="restart-btn">Restart</button>
  <button id="save-btn">Save</button>
  <button id="load-btn">Load</button>
  <button id="quit-btn">Quit</button>
  <input type="file" id="file-input" style="display:none">
</div>

<script src="acrostics.js"></script>

</body>
</html>
